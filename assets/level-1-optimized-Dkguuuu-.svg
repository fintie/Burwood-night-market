  <text x="68" y="588" fill="#F6F8FF" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700">Level identity</text>
  <text x="68" y="620" fill="#B8C7E9" font-size="19" font-family="Arial, Helvetica, sans-serif">Differentiate level 1 as a richer stay-and-share environment, not only overflow circulation.</text>

